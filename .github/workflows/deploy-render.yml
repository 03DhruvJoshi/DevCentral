name: Deploy to Render
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Render deploy hook
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy
        run: |
          # Removed the backslash before the secret
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          
          echo "Deploy hook response: $HTTP_CODE"
          
          # Removed the backslash before the variable
          if [ "${HTTP_CODE:-0}" -ge 200 ] && [ "${HTTP_CODE:-0}" -lt 300 ]; then
            echo "Deploy triggered successfully"
          else
            echo "ERROR: Deploy hook returned HTTP $HTTP_CODE"
            exit 1
          fi
