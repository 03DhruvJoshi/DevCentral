name: Deploy to Render
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Render deploy hook
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy
        run: |
          # Sanitize: Remove potential quotes and whitespace from the secret
          URL=$(echo "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | tr -d '"' | xargs)
          
          if [ -z "$URL" ]; then
            echo "❌ ERROR: RENDER_DEPLOY_HOOK_URL is empty or missing"
            exit 1
          fi

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$URL")
          
          echo "Deploy hook response: $HTTP_CODE"
          if [ "${HTTP_CODE:-0}" -ge 200 ] && [ "${HTTP_CODE:-0}" -lt 300 ]; then
            echo "✅ Deploy triggered successfully"
          else
            echo "❌ ERROR: Deploy hook returned HTTP $HTTP_CODE"
            exit 1
          fi
